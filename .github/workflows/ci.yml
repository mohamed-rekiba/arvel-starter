name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  ARVEL_VERSION: "0.3.0"
  ARVEL_EXTRAS: "[sqlite,media]"
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Render pyproject.toml from template
        run: |
          sed -e "s/{{ app_name }}/arvel-starter/" \
              -e "s/{{ python_version }}/${{ env.PYTHON_VERSION }}/" \
              -e "s/{{ arvel_extras }}/${{ env.ARVEL_EXTRAS }}/" \
              -e "s/{{ arvel_version }}/${{ env.ARVEL_VERSION }}/g" \
              pyproject.toml.j2 > pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Render pyproject.toml from template
        run: |
          sed -e "s/{{ app_name }}/arvel-starter/" \
              -e "s/{{ python_version }}/${{ env.PYTHON_VERSION }}/" \
              -e "s/{{ arvel_extras }}/${{ env.ARVEL_EXTRAS }}/" \
              -e "s/{{ arvel_version }}/${{ env.ARVEL_VERSION }}/g" \
              pyproject.toml.j2 > pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          APP_ENV: testing
          DB_DRIVER: sqlite
          DB_DATABASE: ":memory:"
