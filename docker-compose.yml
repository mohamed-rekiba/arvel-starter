# Arvel Starter — local development stack
#
# Usage:
#   docker compose up        — start all services
#   docker compose up -d     — start in background
#   docker compose down -v   — stop and remove volumes
#
# Default credentials are FOR DEVELOPMENT ONLY — never use in production.

services:
  app:
    build:
      context: ../..
      dockerfile: repos/arvel-starter/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/monorepo/repos/arvel-starter
      - /monorepo/repos/arvel-starter/.venv
    env_file: .env
    environment:
      DB_DRIVER: pgsql
      DB_URL: postgresql+asyncpg://arvel:arvel_dev@postgres:5432/arvel_dev
      CACHE_DRIVER: redis
      CACHE_REDIS_URL: redis://valkey:6379/0
      QUEUE_DRIVER: taskiq
      QUEUE_REDIS_URL: redis://valkey:6379/1
      MAIL_DRIVER: smtp
      MAIL_SMTP_HOST: mailpit
      MAIL_SMTP_PORT: 1025
      MAIL_SMTP_USE_TLS: "false"
      STORAGE_DRIVER: s3
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_ACCESS_KEY: minioadmin           # DEV ONLY
      STORAGE_S3_SECRET_KEY: minioadmin           # DEV ONLY
      STORAGE_S3_BUCKET: arvel-dev
      STORAGE_S3_REGION: us-east-1
      SEARCH_DRIVER: meilisearch
      SEARCH_MEILISEARCH_URL: http://meilisearch:7700
      SEARCH_MEILISEARCH_KEY: devMasterKey        # DEV ONLY
      BROADCAST_DRIVER: redis
      BROADCAST_REDIS_URL: redis://valkey:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: arvel_dev
      POSTGRES_USER: arvel          # DEV ONLY
      POSTGRES_PASSWORD: arvel_dev  # DEV ONLY
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arvel -d arvel_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.29
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1
    environment:
      MEILI_MASTER_KEY: devMasterKey   # DEV ONLY
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin      # DEV ONLY
      MINIO_ROOT_PASSWORD: minioadmin  # DEV ONLY
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/arvel-dev &&
      mc anonymous set download local/arvel-dev &&
      echo 'Bucket arvel-dev ready'
      "

volumes:
  pgdata:
  valkeydata:
  miniodata:
  meilidata:
